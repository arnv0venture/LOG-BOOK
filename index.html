<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LOG BOOK — Personal expense and income tracker with beautiful glassmorphism UI">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LOG BOOK — Expense Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <style>
/* ============================================
   LOG BOOK — Design System & Styles
   ============================================ */

/* --- CSS Custom Properties --- */
:root {
  --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.15);
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms cubic-bezier(0.16, 1, 0.3, 1);
  --accent-purple: #8B5CF6;
  --accent-teal: #14B8A6;
  --color-positive: #10B981;
  --color-negative: #EF4444;
  --color-warning: #F59E0B;
  --glass-blur: 16px;
}

/* --- Dark Theme (default) --- */
[data-theme="dark"] {
  --bg-primary: #0a0e1a;
  --bg-secondary: #0f1729;
  --bg-tertiary: #151d33;
  --glass-bg: rgba(255, 255, 255, 0.04);
  --glass-bg-hover: rgba(255, 255, 255, 0.07);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-hover: rgba(255, 255, 255, 0.14);
  --text-primary: #f0f0f5;
  --text-secondary: #9ca3b4;
  --text-tertiary: #5e6578;
  --input-bg: rgba(255, 255, 255, 0.05);
  --input-border: rgba(255, 255, 255, 0.1);
  --input-focus: rgba(139, 92, 246, 0.4);
  --tab-indicator: var(--accent-purple);
  --skeleton-base: rgba(255, 255, 255, 0.04);
  --skeleton-shine: rgba(255, 255, 255, 0.08);
  --toast-bg: rgba(15, 23, 41, 0.95);
  --scrollbar-track: rgba(255,255,255,0.02);
  --scrollbar-thumb: rgba(255,255,255,0.08);
}

/* --- Light Theme --- */
[data-theme="light"] {
  --bg-primary: #f0f2f7;
  --bg-secondary: #e8ecf4;
  --bg-tertiary: #dde2ed;
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-bg-hover: rgba(255, 255, 255, 0.7);
  --glass-border: rgba(255, 255, 255, 0.6);
  --glass-border-hover: rgba(255, 255, 255, 0.8);
  --text-primary: #1a1d2e;
  --text-secondary: #5a6178;
  --text-tertiary: #8b91a5;
  --input-bg: rgba(255, 255, 255, 0.6);
  --input-border: rgba(0, 0, 0, 0.08);
  --input-focus: rgba(139, 92, 246, 0.3);
  --tab-indicator: var(--accent-purple);
  --skeleton-base: rgba(0, 0, 0, 0.04);
  --skeleton-shine: rgba(0, 0, 0, 0.08);
  --toast-bg: rgba(255, 255, 255, 0.95);
  --scrollbar-track: rgba(0,0,0,0.02);
  --scrollbar-thumb: rgba(0,0,0,0.1);
  --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.08);
}

/* --- Reset & Base --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-stack);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  overflow-x: hidden;
  transition: background var(--transition-base), color var(--transition-base);
  line-height: 1.5;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* --- Background Gradient Blobs --- */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
  transition: opacity var(--transition-slow);
}
body::before {
  width: 500px; height: 500px;
  background: var(--accent-purple);
  top: -150px; right: -100px;
  opacity: 0.12;
}
body::after {
  width: 400px; height: 400px;
  background: var(--accent-teal);
  bottom: -100px; left: -80px;
  opacity: 0.1;
}

/* --- Glass Mixin --- */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  transition: background var(--transition-base), border-color var(--transition-base), box-shadow var(--transition-base);
}
.glass:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
}

/* --- App Container --- */
.app-container {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 0 16px 100px;
}

/* --- Header --- */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  margin: 12px 0;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-radius: var(--radius-lg);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.app-logo {
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.header-date {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.header-balance {
  font-size: 1.1rem;
  font-weight: 700;
  transition: color var(--transition-fast);
}
.header-balance.positive { color: var(--color-positive); }
.header-balance.negative { color: var(--color-negative); }
.header-balance.zero { color: var(--text-secondary); }
.header-balance-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
}

.theme-toggle {
  background: none;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 8px;
  cursor: pointer;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-base);
  width: 38px;
  height: 38px;
}
.theme-toggle:hover {
  border-color: var(--accent-purple);
  color: var(--accent-purple);
  box-shadow: 0 0 12px rgba(139, 92, 246, 0.2);
}
.theme-toggle svg { width: 18px; height: 18px; transition: transform var(--transition-base); }
.theme-toggle:hover svg { transform: rotate(20deg); }

/* --- Tab Navigation --- */
.tab-bar {
  display: flex;
  align-items: center;
  margin: 8px 0;
  padding: 5px;
  position: relative;
  border-radius: var(--radius-md);
  gap: 4px;
}
.tab-btn {
  flex: 1;
  padding: 10px 16px;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-stack);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-base);
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: #fff; }
.tab-btn svg { width: 16px; height: 16px; }
.tab-indicator {
  position: absolute;
  top: 5px;
  left: 5px;
  width: calc(50% - 7px);
  height: calc(100% - 10px);
  background: linear-gradient(135deg, var(--accent-purple), rgba(139, 92, 246, 0.7));
  border-radius: var(--radius-sm);
  transition: transform var(--transition-slow);
  z-index: 1;
  box-shadow: 0 2px 12px rgba(139, 92, 246, 0.3);
}
.tab-indicator.right {
  transform: translateX(calc(100% + 4px));
}

/* --- Summary Strip --- */
.summary-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  margin: 8px 0;
  padding: 14px 8px;
}
.summary-item {
  text-align: center;
  padding: 4px;
}
.summary-value {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 2px;
  white-space: nowrap;
}
.summary-label {
  font-size: 0.62rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.summary-value.spent { color: var(--color-negative); }
.summary-value.income { color: var(--color-positive); }
.summary-value.net-positive { color: var(--color-positive); }
.summary-value.net-negative { color: var(--color-negative); }
.summary-value.streak { color: var(--accent-purple); }

/* --- Tab Panels --- */
.tab-panel {
  display: none;
  animation: fadeIn 300ms ease;
}
.tab-panel.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Quick Log Form --- */
.quick-log {
  padding: 20px;
  margin: 8px 0;
}
.quick-log-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-tertiary);
  margin-bottom: 14px;
  font-weight: 600;
}
.form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-group label {
  font-size: 0.68rem;
  color: var(--text-tertiary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.input-field {
  width: 100%;
  padding: 12px 14px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-stack);
  font-size: 0.95rem;
  transition: all var(--transition-base);
  outline: none;
}
.input-field:focus {
  border-color: var(--accent-purple);
  box-shadow: 0 0 0 3px var(--input-focus);
}
.input-field::placeholder { color: var(--text-tertiary); }
.amount-input {
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: 1px;
  padding: 16px;
}
.amount-input::placeholder {
  font-weight: 400;
  font-size: 1.1rem;
}



/* Submit Button */
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: var(--font-stack);
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
}
.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
}
.btn-submit:active { transform: translateY(0); }
.btn-submit.success {
  background: linear-gradient(135deg, var(--color-positive), #059669);
}
.btn-submit .btn-text { transition: opacity var(--transition-fast); }
.btn-submit .btn-check {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity var(--transition-fast);
}
.btn-submit.success .btn-text { opacity: 0; }
.btn-submit.success .btn-check { opacity: 1; }

/* --- Filter Bar --- */
.filter-bar {
  padding: 14px 16px;
  margin: 8px 0;
}
.filter-bar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.filter-bar-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-bar-toggle {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 4px;
  transition: transform var(--transition-base);
}
.filter-bar-toggle svg { width: 16px; height: 16px; }
.filter-bar-toggle.open { transform: rotate(180deg); }
.filter-body {
  display: none;
  padding-top: 12px;
}
.filter-body.open { display: block; animation: fadeIn 200ms ease; }
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.filter-actions {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}
.btn-filter {
  padding: 8px 16px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-family: var(--font-stack);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-base);
}
.btn-filter:hover { border-color: var(--accent-purple); color: var(--text-primary); }
.btn-filter.active-filter {
  background: rgba(139, 92, 246, 0.15);
  border-color: var(--accent-purple);
  color: var(--accent-purple);
}
.filter-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  margin: 8px 0;
  border-radius: var(--radius-sm);
  background: rgba(139, 92, 246, 0.08);
  border: 1px solid rgba(139, 92, 246, 0.15);
  font-size: 0.8rem;
  color: var(--accent-purple);
  font-weight: 500;
  animation: fadeIn 200ms ease;
}
.filter-summary .clear-btn {
  background: none;
  border: none;
  color: var(--accent-purple);
  cursor: pointer;
  font-family: var(--font-stack);
  font-weight: 600;
  font-size: 0.78rem;
  text-decoration: underline;
}

/* --- Entry List --- */
.entry-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 4px;
}
.entry-list-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.entry-list-total {
  font-size: 1rem;
  font-weight: 700;
}

.entry-item {
  padding: 14px 16px;
  margin: 6px 0;
  border-radius: var(--radius-md);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all var(--transition-base);
  cursor: pointer;
  position: relative;
  animation: slideIn 300ms ease;
}
.entry-item:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
}
.entry-item.deleting {
  animation: slideOut 300ms ease forwards;
}
.entry-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  background: rgba(139, 92, 246, 0.1);
}
.entry-details {
  flex: 1;
  min-width: 0;
}
.entry-amount {
  font-size: 1.05rem;
  font-weight: 700;
}
.entry-meta {
  font-size: 0.72rem;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
}
.entry-note {
  font-size: 0.78rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.entry-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.btn-icon {
  background: none;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all var(--transition-base);
}
.btn-icon:hover { background: rgba(239, 68, 68, 0.1); color: var(--color-negative); }
.btn-icon svg { width: 16px; height: 16px; }
.btn-confirm-delete {
  padding: 4px 12px;
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--radius-sm);
  color: var(--color-negative);
  font-family: var(--font-stack);
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-base);
  animation: fadeIn 150ms ease;
}
.btn-confirm-delete:hover {
  background: var(--color-negative);
  color: #fff;
}

/* Inline Edit */
.entry-item.editing {
  border-color: var(--accent-purple);
  box-shadow: 0 0 0 2px var(--input-focus);
}
.edit-input {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: var(--font-stack);
  padding: 4px 8px;
  font-size: 0.85rem;
  outline: none;
  width: 100%;
  max-width: 120px;
}
.edit-input:focus {
  border-color: var(--accent-purple);
}
.edit-actions {
  display: flex;
  gap: 4px;
}
.btn-edit-save, .btn-edit-cancel {
  padding: 3px 10px;
  border-radius: 4px;
  border: none;
  font-family: var(--font-stack);
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-base);
}
.btn-edit-save {
  background: var(--accent-purple);
  color: #fff;
}
.btn-edit-cancel {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  color: var(--text-secondary);
}

/* --- Monthly Analysis --- */
.monthly-section {
  margin: 12px 0;
  padding: 20px;
}
.monthly-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  cursor: pointer;
}
.monthly-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  font-weight: 600;
}
.monthly-toggle {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 4px;
  transition: transform var(--transition-base);
}
.monthly-toggle svg { width: 16px; height: 16px; }
.monthly-toggle.open { transform: rotate(180deg); }
.monthly-body { display: none; }
.monthly-body.open { display: block; animation: fadeIn 250ms ease; }

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.month-nav-btn {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-stack);
  font-size: 0.8rem;
  transition: all var(--transition-base);
}
.month-nav-btn:hover { border-color: var(--accent-purple); color: var(--text-primary); }
.month-nav-label {
  font-size: 0.95rem;
  font-weight: 700;
}

.month-total {
  text-align: center;
  margin-bottom: 18px;
}
.month-total-value {
  font-size: 1.8rem;
  font-weight: 800;
}
.month-total-label {
  font-size: 0.7rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
}



/* Day-by-day list */
.day-row {
  border-bottom: 1px solid var(--glass-border);
  padding: 10px 0;
}
.day-row-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  padding: 4px 0;
}
.day-row-date {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.day-row-total {
  font-size: 0.85rem;
  font-weight: 700;
}
.day-row-count {
  font-size: 0.7rem;
  color: var(--text-tertiary);
  margin-left: 8px;
}
.day-row-expand {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 2px;
  transition: transform var(--transition-base);
}
.day-row-expand.open { transform: rotate(180deg); }
.day-row-expand svg { width: 14px; height: 14px; }
.day-row-entries {
  display: none;
  padding: 6px 0 6px 14px;
}
.day-row-entries.open { display: block; animation: fadeIn 200ms ease; }
.day-entry {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.day-entry-amount { font-weight: 600; color: var(--text-primary); }

/* Export Button */
.btn-export {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  margin-top: 14px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-family: var(--font-stack);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-base);
}
.btn-export:hover {
  border-color: var(--accent-teal);
  color: var(--accent-teal);
}
.btn-export svg { width: 16px; height: 16px; }

/* --- Skeleton Loader --- */
.skeleton {
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin: 6px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.skeleton-circle {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  background: var(--skeleton-base);
  animation: pulse 1.5s infinite;
  flex-shrink: 0;
}
.skeleton-lines { flex: 1; }
.skeleton-line {
  height: 10px;
  border-radius: 4px;
  background: var(--skeleton-base);
  animation: pulse 1.5s infinite;
  margin-bottom: 8px;
}
.skeleton-line:last-child { margin-bottom: 0; width: 60%; }
.skeleton-line.w-70 { width: 70%; }

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* --- Empty State --- */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-tertiary);
}
.empty-state svg {
  width: 80px;
  height: 80px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.empty-state-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.empty-state-desc {
  font-size: 0.78rem;
}

/* --- Toast Notifications --- */
#toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 12px 20px;
  background: var(--toast-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-primary);
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: toastIn 300ms ease, toastOut 300ms ease 2700ms forwards;
  pointer-events: auto;
  min-width: 200px;
  text-align: center;
}
.toast.error { border-color: rgba(239, 68, 68, 0.3); color: var(--color-negative); }
.toast.success { border-color: rgba(16, 185, 129, 0.3); color: var(--color-positive); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-20px); }
}

/* --- Context Menu --- */
.context-menu {
  position: fixed;
  z-index: 9998;
  background: var(--toast-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  padding: 6px 0;
  min-width: 160px;

}
.context-menu.show { display: block; }
.context-menu-item {

  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;

.context-menu-item:hover {

}
.context-menu-item.danger { color: var(--color-negative); }
.context-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); }
.context-menu-item svg { width: 14px; height: 14px; }

/* --- Animations --- */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideOut {
  from { opacity: 1; transform: translateX(0); height: auto; margin: 6px 0; }

  <script>
/* ============================================
   LOG BOOK — Application Logic
   ============================================ */
(function() {
  'use strict';

  // ===== CONSTANTS =====


  // ===== SUPABASE INIT =====
  let supabase;
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e) {
    console.error('Supabase init failed:', e);
  }

  // ===== STATE =====
  const state = {
    activeTab: 'expenses',
    todayExpenses: [],
    todayIncome: [],
    filteredExpenses: null,
    filteredIncome: null,
    expMonthData: null,
    incMonthData: null,
    expMonth: { year: new Date().getFullYear(), month: new Date().getMonth() },
    incMonth: { year: new Date().getFullYear(), month: new Date().getMonth() },
    monthCache: new Map(),
    streak: 0,
    monthTotalSpent: 0,
    monthTotalIncome: 0,
    filtersActive: { expenses: false, income: false },
    editingId: null,
    editingType: null,
    contextEntry: null,
    contextType: null
  };

  // ===== UTILITY FUNCTIONS =====
  function formatCurrency(n) {
    return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2 }).format(n || 0);
  }

  function formatTime(d) {
    return new Date(d).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function formatDateFull(d) {
    return new Date(d).toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function formatMonthYear(y, m) {
    return new Date(y, m).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function generateId() {
    return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function debounce(fn, ms) {
    let t;
    return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }

  function showToast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3100);
  }

  function parseAmount(v) {
    const s = String(v).replace(/[^0-9.]/g, '');
    const n = parseFloat(s);
    return isNaN(n) || n <= 0 ? null : Math.round(n * 100) / 100;
  }

  // ===== HASH ROUTING =====
  function parseHash() {
    const h = location.hash.slice(1);
    if (!h) return {};
    const parts = h.split('?');
    const result = { tab: parts[0] || 'expenses' };
    if (parts[1]) {
      parts[1].split('&').forEach(p => {
        const [k, v] = p.split('=');
        if (k && v) result[k] = decodeURIComponent(v);
      });
    }
    return result;
  }

  function updateHash() {
    const tab = state.activeTab;
    let params = [];
    // We only encode tab in hash, filters are transient
    location.hash = tab;
  }

  // ===== DOM REFERENCES =====
  const $ = id => document.getElementById(id);

  // ===== THEME =====
  function initTheme() {
    const saved = localStorage.getItem('logbook-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('logbook-theme', next);
    updateThemeIcon(next);
  }

  function updateThemeIcon(theme) {

  // ===== SUMMARY STRIP =====
  async function updateSummary() {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    const key = `${y}-${m}`;

    // Fetch current month totals
    try {
      const firstDay = `${y}-${String(m + 1).padStart(2, '0')}-01`;
      const lastDay = new Date(y, m + 1, 0);
      const lastDayStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(lastDay.getDate()).padStart(2, '0')}`;

      const [expRes, incRes] = await Promise.all([
        supabase.from('expenses').select('amount').gte('entry_date', firstDay).lte('entry_date', lastDayStr),
        supabase.from('income').select('amount').gte('entry_date', firstDay).lte('entry_date', lastDayStr)
      ]);

      state.monthTotalSpent = (expRes.data || []).reduce((s, e) => s + Number(e.amount), 0);
      state.monthTotalIncome = (incRes.data || []).reduce((s, e) => s + Number(e.amount), 0);
    } catch(e) { console.error('Summary fetch error:', e); }

    $('summarySpent').textContent = formatCurrency(state.monthTotalSpent);
    $('summaryIncome').textContent = formatCurrency(state.monthTotalIncome);

    const net = state.monthTotalIncome - state.monthTotalSpent;
    const netEl = $('summaryNet');
    netEl.textContent = formatCurrency(Math.abs(net));
    if (net > 0) { netEl.textContent = '+' + netEl.textContent; netEl.className = 'summary-value net-positive'; }
    else if (net < 0) { netEl.textContent = '-' + formatCurrency(Math.abs(net)); netEl.className = 'summary-value net-negative'; }
    else { netEl.className = 'summary-value'; }

    // Streak
    await updateStreak();
  }

  async function updateStreak() {
    try {
      // Get distinct dates from both tables, last 60 days
      const sixtyAgo = new Date();
      sixtyAgo.setDate(sixtyAgo.getDate() - 60);
      const cutoff = sixtyAgo.toISOString().split('T')[0];

      const [expRes, incRes] = await Promise.all([
        supabase.from('expenses').select('entry_date').gte('entry_date', cutoff).order('entry_date', { ascending: false }),
        supabase.from('income').select('entry_date').gte('entry_date', cutoff).order('entry_date', { ascending: false })
      ]);

      const dates = new Set();
      (expRes.data || []).forEach(e => dates.add(e.entry_date));
      (incRes.data || []).forEach(e => dates.add(e.entry_date));

      const sorted = [...dates].sort().reverse();
      let streak = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      for (let i = 0; i < sorted.length; i++) {
        const expected = new Date(today);
        expected.setDate(expected.getDate() - i);
        const expStr = expected.toISOString().split('T')[0];
        if (sorted.includes(expStr)) { streak++; }
        else break;
      }
      state.streak = streak;
    } catch(e) { state.streak = 0; }
    $('summaryStreak').textContent = state.streak;
  }

  async function fetchMonthData(type, year, month) {
    const key = `${type}-${year}-${month}`;
    if (state.monthCache.has(key)) return state.monthCache.get(key);

    const table = type === 'expenses' ? 'expenses' : 'income';
    const firstDay = `${year}-${String(month + 1).padStart(2, '0')}-01`;
    const lastDate = new Date(year, month + 1, 0);
    const lastDay = `${year}-${String(month + 1).padStart(2, '0')}-${String(lastDate.getDate()).padStart(2, '0')}`;

    try {
      const { data, error } = await supabase
        .from(table)
        .select('*')
        .gte('entry_date', firstDay)
        .lte('entry_date', lastDay)
        .order('entry_date', { ascending: false })
        .order('logged_at', { ascending: false });
      if (error) throw error;
      state.monthCache.set(key, data || []);
      return data || [];
    } catch(e) {
      console.error(`Fetch ${type} month error:`, e);
      showToast(`Failed to load ${type} data`, 'error');
      return [];
    }
  }

  async function fetchFilteredData(type, filters) {
    const table = type === 'expenses' ? 'expenses' : 'income';
    try {
      let query = supabase.from(table).select('*');
      if (filters.dateFrom) query = query.gte('entry_date', filters.dateFrom);
      if (filters.dateTo) query = query.lte('entry_date', filters.dateTo);

      if (filters.search) {
        const col = type === 'expenses' ? 'note' : 'source_label';
        query = query.ilike(col, `%${filters.search}%`);
      }
      query = query.order('entry_date', { ascending: false }).order('logged_at', { ascending: false });
      const { data, error } = await query;
      if (error) throw error;
      return data || [];
    } catch(e) {
      console.error('Filter error:', e);
      showToast('Filter failed', 'error');
      return [];
    }
  }

  function exportCSV(data, type) {
    if (!data || data.length === 0) { showToast('No data to export', 'error'); return; }
    let csv;
    if (type === 'expenses') {
      csv = 'Date,Amount,Note,Logged At\n';
      csv += data.map(e => `${e.entry_date},${e.amount},"${(e.note || '').replace(/"/g, '""')}",${e.logged_at}`).join('\n');
    } else {
      csv = 'Date,Amount,Source,Logged At\n';
      csv += data.map(e => `${e.entry_date},${e.amount},"${(e.source_label || '').replace(/"/g, '""')}",${e.logged_at}`).join('\n');
    }
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `logbook_${type}_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV exported!', 'success');
  }

  // ===== CRUD OPERATIONS =====
  async function addExpense() {
    const amountVal = parseAmount($('expenseAmount').value);
    if (!amountVal) { showToast('Enter a valid amount', 'error'); return; }

    const note = $('expenseNote').value.trim();
    const entryDate = $('expenseDate').value || todayStr();

    const entry = {
      id: generateId(),
      amount: amountVal,
      note: note || null,
      entry_date: entryDate,
      logged_at: new Date().toISOString()
    };

    // Optimistic update
    if (entryDate === todayStr()) {
      state.todayExpenses.unshift(entry);
      renderExpenseList();
    }
    updateHeader();

    // Show success animation
    const btn = $('btnLogExpense');
    btn.classList.add('success');
    setTimeout(() => btn.classList.remove('success'), 1200);

    // Clear form
    $('expenseAmount').value = '';
    $('expenseNote').value = '';
    $('expenseAmount').focus();

    // Persist
    try {
      const { error } = await supabase.from('expenses').insert({
        id: entry.id,
        amount: entry.amount,
        note: entry.note,
        entry_date: entry.entry_date
      });
      if (error) throw error;
      // Invalidate month cache
      const d = new Date(entryDate);
      state.monthCache.delete(`expenses-${d.getFullYear()}-${d.getMonth()}`);
      updateSummary();
    } catch(e) {
      console.error('Add expense error:', e);
      showToast('Failed to save expense — will retry', 'error');
      // Remove optimistic entry on failure
      state.todayExpenses = state.todayExpenses.filter(x => x.id !== entry.id);
      renderExpenseList();
      updateHeader();
    }
  }

  async function deleteEntry(id, type) {
    const table = type === 'expenses' ? 'expenses' : 'income';
    const list = type === 'expenses' ? 'todayExpenses' : 'todayIncome';

    // Animate out
    const el = document.querySelector(`.entry-item[data-id="${id}"]`);
    if (el) {
      el.classList.add('deleting');
      await new Promise(r => setTimeout(r, 280));
    }

    // Optimistic remove
    const removed = state[list].find(e => e.id === id);
    state[list] = state[list].filter(e => e.id !== id);

    // Also remove from filtered results if active
    if (state.filtersActive[type]) {
      const filteredList = type === 'expenses' ? 'filteredExpenses' : 'filteredIncome';
      if (state[filteredList]) {
        state[filteredList] = state[filteredList].filter(e => e.id !== id);
      }
    }

    if (type === 'expenses') renderExpenseList();
    else renderIncomeList();
    updateHeader();

    try {
      const { error } = await supabase.from(table).delete().eq('id', id);
      if (error) throw error;
      // Invalidate cache
      if (removed) {
        const d = new Date(removed.entry_date);
        state.monthCache.delete(`${type}-${d.getFullYear()}-${d.getMonth()}`);
      }
      showToast('Entry deleted', 'success');
      updateSummary();
    } catch(e) {
      console.error('Delete error:', e);
      showToast('Delete failed', 'error');
      // Restore on failure
      if (removed) {
        state[list].unshift(removed);
        if (type === 'expenses') renderExpenseList();
        else renderIncomeList();
        updateHeader();
      }
    }
  }

  // ===== INLINE EDIT =====
  window._saveEdit = async function(id, type) {
    const amountEl = document.getElementById(`editAmount-${id}`);
    const noteEl = document.getElementById(`editNote-${id}`);
    const newAmount = parseAmount(amountEl.value);
    if (!newAmount) { showToast('Invalid amount', 'error'); return; }
    const newNote = noteEl.value.trim();

    const table = type === 'expenses' ? 'expenses' : 'income';
    const list = type === 'expenses' ? 'todayExpenses' : 'todayIncome';
    const noteField = type === 'expenses' ? 'note' : 'source_label';

    // Optimistic update
    const entry = state[list].find(e => e.id === id);
    if (entry) {
      entry.amount = newAmount;
      entry[noteField] = newNote || null;
    }

    // Also update filtered list if applicable
    if (state.filtersActive[type]) {
      const filteredList = type === 'expenses' ? 'filteredExpenses' : 'filteredIncome';
      if (state[filteredList]) {
        const fe = state[filteredList].find(e => e.id === id);
        if (fe) {
          fe.amount = newAmount;
          fe[noteField] = newNote || null;
        }
      }
    }

    state.editingId = null;
    state.editingType = null;
    if (type === 'expenses') renderExpenseList();
    else renderIncomeList();
    updateHeader();

    try {
      const update = { amount: newAmount };
      update[noteField] = newNote || null;
      const { error } = await supabase.from(table).update(update).eq('id', id);
      if (error) throw error;
      // Invalidate cache
      if (entry) {
        const d = new Date(entry.entry_date);
        state.monthCache.delete(`${type}-${d.getFullYear()}-${d.getMonth()}`);
      }
      showToast('Entry updated', 'success');
      updateSummary();
    } catch(e) {
      console.error('Edit error:', e);
      showToast('Update failed', 'error');
    }
  };

  window._cancelEdit = function() {
    state.editingId = null;
    state.editingType = null;
    renderExpenseList();
    renderIncomeList();
  };

  function startEdit(id, type) {
    state.editingId = id;
    state.editingType = type;
    if (type === 'expenses') renderExpenseList();
    else renderIncomeList();

    // Focus the amount input
    setTimeout(() => {
      const input = document.getElementById(`editAmount-${id}`);
      if (input) { input.focus(); input.select(); }
    }, 50);
  }

  // ===== FILTER LOGIC =====
  async function applyExpenseFilters() {
    const dateFrom = $('expFilterDateFrom').value;
    const dateTo = $('expFilterDateTo').value;
    const search = $('expFilterSearch').value.trim();

    if (!dateFrom && !dateTo && !search) {
      clearExpenseFilters();
      return;
    }

    const filters = { dateFrom, dateTo, search };
    state.filteredExpenses = await fetchFilteredData('expenses', filters);
    state.filtersActive.expenses = true;

    const total = state.filteredExpenses.reduce((s, e) => s + Number(e.amount), 0);
    $('expenseFilterSummary').style.display = 'flex';
    $('expFilterSummaryText').textContent = `Showing ${state.filteredExpenses.length} entries — ${formatCurrency(total)} total`;
    renderExpenseList();
  }

  function clearExpenseFilters() {
    $('expFilterDateFrom').value = '';
    $('expFilterDateTo').value = '';
    $('expFilterSearch').value = '';
    state.filteredExpenses = null;
    state.filtersActive.expenses = false;
    $('expenseFilterSummary').style.display = 'none';
    renderExpenseList();
  }

  async function applyIncomeFilters() {
    const dateFrom = $('incFilterDateFrom').value;
    const dateTo = $('incFilterDateTo').value;
    const search = $('incFilterSearch').value.trim();

    if (!dateFrom && !dateTo && !search) {
      clearIncomeFilters();
      return;
    }

    const filters = { dateFrom, dateTo, search };
    state.filteredIncome = await fetchFilteredData('income', filters);
    state.filtersActive.income = true;

    const total = state.filteredIncome.reduce((s, e) => s + Number(e.amount), 0);
    $('incomeFilterSummary').style.display = 'flex';
    $('incFilterSummaryText').textContent = `Showing ${state.filteredIncome.length} entries — ${formatCurrency(total)} total`;
    renderIncomeList();
  }

  function clearIncomeFilters() {
    $('incFilterDateFrom').value = '';
    $('incFilterDateTo').value = '';
    $('incFilterSearch').value = '';
    state.filteredIncome = null;
    state.filtersActive.income = false;
    $('incomeFilterSummary').style.display = 'none';
    renderIncomeList();
  }

  // ===== CONTEXT MENU =====
  function showContextMenu(e, id, type) {
    e.preventDefault();
    state.contextEntry = id;
    state.contextType = type;
    const menu = $('contextMenu');
    menu.classList.add('show');

    // Position
    const x = e.clientX || e.touches?.[0]?.clientX || 100;
    const y = e.clientY || e.touches?.[0]?.clientY || 100;
    menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
    menu.style.top = Math.min(y, window.innerHeight - 100) + 'px';
  }

  function hideContextMenu() {
    $('contextMenu').classList.remove('show');
    state.contextEntry = null;
    state.contextType = null;
  }

  // ===== EVENT LISTENERS =====
  function attachEvents() {
    // Theme toggle
    $('themeToggle').addEventListener('click', toggleTheme);

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });



    // Submit expense
    $('btnLogExpense').addEventListener('click', addExpense);
    $('expenseAmount').addEventListener('keydown', (e) => { if (e.key === 'Enter') addExpense(); });

    // Submit income
    $('btnLogIncome').addEventListener('click', addIncome);
    $('incomeAmount').addEventListener('keydown', (e) => { if (e.key === 'Enter') addIncome(); });

    // Delete handlers (delegation)
    document.addEventListener('click', (e) => {
      const deleteBtn = e.target.closest('.btn-delete');
      if (deleteBtn) {
        const id = deleteBtn.dataset.id;
        const type = deleteBtn.dataset.type;
        // Show confirm button
        const parent = deleteBtn.parentElement;
        if (parent.querySelector('.btn-confirm-delete')) return; // Already showing
        deleteBtn.style.display = 'none';
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'btn-confirm-delete';
        confirmBtn.textContent = 'Confirm?';
        confirmBtn.onclick = () => deleteEntry(id, type);
        parent.appendChild(confirmBtn);

        // Auto-cancel after 3 seconds
        setTimeout(() => {
          if (parent.contains(confirmBtn)) {
            confirmBtn.remove();
            deleteBtn.style.display = '';
          }
        }, 3000);
        return;
      }

      // Entry click for edit (but not on action buttons)
      const entryItem = e.target.closest('.entry-item');
      if (entryItem && !e.target.closest('.entry-actions') && !e.target.closest('.edit-actions') && !e.target.closest('.edit-input')) {
        const id = entryItem.dataset.id;
        const type = entryItem.dataset.type;
        if (state.editingId !== id) {
          startEdit(id, type);
        }
      }
    });

    // Context menu (right-click)
    document.addEventListener('contextmenu', (e) => {
      const entryItem = e.target.closest('.entry-item');
      if (entryItem) {
        showContextMenu(e, entryItem.dataset.id, entryItem.dataset.type);
      }
    });

    // Long-press for mobile context menu
    let longPressTimer;
    document.addEventListener('touchstart', (e) => {
      const entryItem = e.target.closest('.entry-item');
      if (entryItem) {
        longPressTimer = setTimeout(() => {
          showContextMenu(e, entryItem.dataset.id, entryItem.dataset.type);
        }, 600);
      }
    });
    document.addEventListener('touchend', () => clearTimeout(longPressTimer));
    document.addEventListener('touchmove', () => clearTimeout(longPressTimer));

    // Context menu actions
    $('ctxEdit').addEventListener('click', () => {
      if (state.contextEntry) startEdit(state.contextEntry, state.contextType);
      hideContextMenu();
    });
    $('ctxDelete').addEventListener('click', () => {
      if (state.contextEntry) deleteEntry(state.contextEntry, state.contextType);
      hideContextMenu();
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.context-menu')) hideContextMenu();
    });

    // Filter toggles
    $('expenseFilterToggle').addEventListener('click', () => {
      $('expenseFilterBody').classList.toggle('open');
      $('expenseFilterChevron').classList.toggle('open');
    });
    $('incomeFilterToggle').addEventListener('click', () => {
      $('incomeFilterBody').classList.toggle('open');
      $('incomeFilterChevron').classList.toggle('open');
    });

    // Filter actions
    $('btnApplyExpFilter').addEventListener('click', applyExpenseFilters);
    $('btnClearExpFilter').addEventListener('click', clearExpenseFilters);
    $('expFilterSummaryClear').addEventListener('click', clearExpenseFilters);
    $('btnApplyIncFilter').addEventListener('click', applyIncomeFilters);
    $('btnClearIncFilter').addEventListener('click', clearIncomeFilters);
    $('incFilterSummaryClear').addEventListener('click', clearIncomeFilters);

    // Search debounce
    $('expFilterSearch').addEventListener('input', debounce(() => {
      if (state.filtersActive.expenses) applyExpenseFilters();
    }, 400));
    $('incFilterSearch').addEventListener('input', debounce(() => {
      if (state.filtersActive.income) applyIncomeFilters();
    }, 400));

    // Monthly analysis toggles
    $('expenseMonthlyToggle').addEventListener('click', () => {
      const body = $('expenseMonthlyBody');
      const chevron = $('expenseMonthlyChevron');
      body.classList.toggle('open');
      chevron.classList.toggle('open');
      if (body.classList.contains('open')) renderMonthlyExpenses();
    });
    $('incomeMonthlyToggle').addEventListener('click', () => {
      const body = $('incomeMonthlyBody');
      const chevron = $('incomeMonthlyChevron');
      body.classList.toggle('open');
      chevron.classList.toggle('open');
      if (body.classList.contains('open')) renderMonthlyIncome();
    });

    // Month navigation
    $('expMonthPrev').addEventListener('click', () => {
      state.expMonth.month--;
      if (state.expMonth.month < 0) { state.expMonth.month = 11; state.expMonth.year--; }
      renderMonthlyExpenses();
    });
    $('expMonthNext').addEventListener('click', () => {
      state.expMonth.month++;
      if (state.expMonth.month > 11) { state.expMonth.month = 0; state.expMonth.year++; }
      renderMonthlyExpenses();
    });
    $('incMonthPrev').addEventListener('click', () => {
      state.incMonth.month--;
      if (state.incMonth.month < 0) { state.incMonth.month = 11; state.incMonth.year--; }
      renderMonthlyIncome();
    });
    $('incMonthNext').addEventListener('click', () => {
      state.incMonth.month++;
      if (state.incMonth.month > 11) { state.incMonth.month = 0; state.incMonth.year++; }
      renderMonthlyIncome();
    });

    // CSV Export
    $('btnExportExpenses').addEventListener('click', () => exportCSV(state.expMonthData, 'expenses'));
    $('btnExportIncome').addEventListener('click', () => exportCSV(state.incMonthData, 'income'));

    // Hash change
    window.addEventListener('hashchange', () => {
      const params = parseHash();
      if (params.tab && params.tab !== state.activeTab) switchTab(params.tab);
    });
  }

  // ===== INITIALIZATION =====
  async function init() {
    // Theme
    initTheme();

    // Set default dates
    $('expenseDate').value = todayStr();
    $('incomeDate').value = todayStr();

    // Header date
    updateHeader();

    // Parse hash for tab
    const params = parseHash();
    if (params.tab === 'income') switchTab('income');

    // Month labels
    $('expMonthLabel').textContent = formatMonthYear(state.expMonth.year, state.expMonth.month);
    $('incMonthLabel').textContent = formatMonthYear(state.incMonth.year, state.incMonth.month);

    // Attach events
    attachEvents();

    // Fetch today's data
    await Promise.all([fetchTodayExpenses(), fetchTodayIncome()]);

    // Render
    renderExpenseList();
    renderIncomeList();
    updateHeader();

    // Summary (non-blocking)
    updateSummary();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
    }
  }

  // Start app
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
  </script>
</body>
</html>
