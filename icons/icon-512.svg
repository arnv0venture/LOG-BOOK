<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="110" y="96" width="32" height="320" rx="8" fill="url(#accent)" opacity="0.9"/>
  <!-- Book pages -->
  <rect x="142" y="96" width="260" height="320" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Lines on page -->
  <line x1="174" y1="152" x2="370" y2="152" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="174" y1="194" x2="350" y2="194" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <line x1="174" y1="236" x2="360" y2="236" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <line x1="174" y1="278" x2="330" y2="278" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
  <line x1="174" y1="320" x2="340" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
  <!-- Rupee symbol -->
  <text x="260" y="395" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" text-anchor="middle" opacity="0.8">₹</text>
  <!-- Checkmark -->
  <circle cx="374" cy="140" r="36" fill="url(#accent)" opacity="0.85"/>
  <polyline points="356,140 368,153 394,124" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
