<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="42" y="36" width="12" height="120" rx="3" fill="url(#accent)" opacity="0.9"/>
  <!-- Book pages -->
  <rect x="54" y="36" width="96" height="120" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Lines on page -->
  <line x1="66" y1="58" x2="138" y2="58" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="66" y1="74" x2="130" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="66" y1="90" x2="134" y2="90" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="66" y1="106" x2="120" y2="106" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="66" y1="122" x2="126" y2="122" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Rupee symbol -->
  <text x="96" y="148" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="url(#accent)" text-anchor="middle" opacity="0.8">₹</text>
  <!-- Checkmark -->
  <circle cx="140" cy="52" r="14" fill="url(#accent)" opacity="0.85"/>
  <polyline points="133,52 138,57 148,46" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
